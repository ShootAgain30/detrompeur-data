<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Détrompeur Supply</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 2fr 1fr; height: 100vh; gap: 2px; background: #444; }
        .cell { background: #000; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; }
        
        /* GRILLE DE RÉSULTATS AVEC LES 4 COULEURS */
        #results-grid { grid-column: 2/4; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 2px; background: #444; }
        .res-cell { background: #000; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: bold; }
        
        input { width: 90%; background: transparent; border: none; color: #fff; font-size: 3.5rem; text-align: center; outline: none; }
        
        .yellow { color: #ffff00; }
        .blue { color: #1e90ff; }
        .green { color: #00ff00; }
        .red { color: #ff3131; }
        ::placeholder { color: #333; }
    </style>
</head>
<body>
    <div class="grid">
        <div class="cell"><input type="number" id="inP" placeholder="P" oninput="chercherP()"></div>
        <div id="results-grid">
            <div class="res-cell yellow" id="rY">--</div>
            <div class="res-cell blue" id="rB">--</div>
            <div class="res-cell green" id="rG">--</div>
            <div class="res-cell red" id="rR">--</div>
        </div>
        <div class="cell" style="font-size: 1.2rem; color: #666;">QUAI</div>
        <div class="cell"><input type="number" id="inQ" placeholder="Q" oninput="chercherQ()"></div>
        <div class="cell" id="rQ" style="border-left: 2px dashed #444; font-size: 5rem;">--</div>
    </div>

    <script>
        const URL_DATA = "https://raw.githubusercontent.com/ShootAgain30/detrompeur-data/main/data.json";
        
        async function chargerDonnees() {
            try {
                const res = await fetch(URL_DATA);
                const data = await res.json();
                localStorage.setItem('db', JSON.stringify(data));
            } catch (e) { console.log("Mode hors-ligne"); }
        }

        function chercherP() {
            const val = document.getElementById('inP').value;
            const db = JSON.parse(localStorage.getItem('db'));
            if(db && db.picking && db.picking[val]) {
                const r = db.picking[val];
                document.getElementById('rY').innerText = r[0];
                document.getElementById('rB').innerText = r[1];
                document.getElementById('rG').innerText = r[2];
                document.getElementById('rR').innerText = r[3];
            }
        }

        function chercherQ() {
            const val = document.getElementById('inQ').value;
            const db = JSON.parse(localStorage.getItem('db'));
            if(db && db.quais && db.quais[val]) {
                document.getElementById('rQ').innerText = db.quais[val];
            }
        }

        chargerDonnees();

        // Enregistrement du Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log("SW OK"))
                    .catch(err => console.log("SW Erreur"));
            });
        }
    </script>
</body>
</html>
